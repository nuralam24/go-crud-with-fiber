version: "2"
sql:
  - schema: "db/schema"
    queries: "db/query"
    engine: "postgresql"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/repository/postgres/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: true
        emit_interface: false
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              package: "uuid"
              type: "UUID"
          - db_type: "pg_catalog.timestamptz"
            go_type:
              import: "time"
              package: "time"
              type: "Time"
